name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  schedule:
    # Re-fetch content from GitCode repos daily at 2:17 AM UTC
    - cron: '17 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  fetch-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Pre-fetch content from GitCode repos
        run: |
          rm -rf content/reports content/index.json
          python build_content.py

      - name: Commit pre-fetched content (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/
          if git diff --staged --quiet; then
            echo "No content changes detected"
          else
            git commit -m "chore: update pre-fetched content from GitCode repos"
            git push
          fi

  deploy:
    needs: fetch-content
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with latest content)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ensure content exists
        run: |
          if [ ! -f content/index.json ]; then
            echo "Content not found, re-fetching..."
            python build_content.py
          else
            echo "Content already present"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
